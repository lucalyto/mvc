<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - CinePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    background-color: #050505;
    color: white; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-container {
    padding-top: 100px;
    padding-bottom: 50px;
}

.profile-card {
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.user-header {
    border-left: 4px solid #e50914;
    padding-left: 20px;
    margin-bottom: 30px;
}

.user-name {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
}

.table-responsive {
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.table {
    background: #000000; 
    color: white; 
    margin-bottom: 0;
}

.table > :not(caption) > * > * {
    background-color: #000000;
    color: white;
    border-bottom-color: rgba(255, 255, 255, 0.1);
}

.table thead {
    background-color: #e50914;
}

.table thead th {
    border: none;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
    padding: 15px;
    color: white; 
    background-color: #e50914 !important;
}

.table tbody td {
    padding: 15px;
    vertical-align: middle;
}

.badge-seat {
    background: rgba(229, 9, 20, 0.2);
    color: #ff4d4d; 
    border: 1px solid #e50914;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 0.9rem;
}

.btn-back {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 12px 30px;
    border-radius: 30px;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    font-weight: 600;
    font-size: 0.9rem;
}

.btn-back:hover {
    background: white;
    color: black;
    border-color: white;
}

.text-muted {
    color: #aaa !important; 
}
</style>
</head>
<body>

    <div class="container profile-container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="profile-card">
                    
                    <div class="user-header">
                        <p class="text-muted mb-1 text-uppercase small">Área do Cliente</p>
                        <h2 class="user-name">Olá, <span id="nomeUsuario">...</span>!</h2>
                    </div>

                    <h5 class="mb-4 text-white">
                        <i class="fas fa-ticket-alt me-2" style="color: #e50914;"></i>Seus Ingressos
                    </h5>

                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Filme</th>
                                    <th>Assento</th>
                                    <th>Data e Hora</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaCorpo">
                            </tbody>
                        </table>
                    </div>

                    <a href="menu.html" class="btn-back">
                        <i class="fas fa-arrow-left me-2"></i>Voltar ao Início
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = async function() {
            const usuario = localStorage.getItem('nomeUsuario')
            
            if (!usuario) {
                window.location.href = 'login.html'
                return
            }
            
            document.getElementById('nomeUsuario').innerText = usuario

            try {
                const response = await fetch(`/meus-ingressos?usuario=${usuario}`)
                const ingressos = await response.json()
                
                const corpo = document.getElementById('tabelaCorpo')
                corpo.innerHTML = ""

                if (ingressos.length === 0) {
                    corpo.innerHTML = `
                        <tr>
                            <td colspan="3" class="text-center py-5 text-muted">
                                <i class="fas fa-search fa-2x mb-3 d-block"></i>
                                Nenhum ingresso encontrado para sua conta.
                            </td>
                        </tr>`
                    return
                }

                ingressos.forEach(ing => {
                    const dataObj = new Date(ing.data_compra)
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR')
                    const horaFormatada = dataObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                    
                    corpo.innerHTML += `
                        <tr>
                            <td><strong>${ing.nome_filme}</strong></td>
                            <td><span class="badge-seat">${ing.assento}</span></td>
                            <td class="text-muted">${dataFormatada} às ${horaFormatada}</td>
                        </tr>
                    `
                })
            } catch (error) {
                console.error("Erro ao carregar dados do perfil:", error)
            }
        }
    </script>
</body>
</html>
