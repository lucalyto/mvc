<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Assentos - CinePro Ultra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
body { 
    background: #050505; 
    color: #fff; 
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.cinema-container {
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 32px;
    padding: 40px;
    width: 100%;
    max-width: 900px;
    text-align: center;
    position: relative;
}

.movie-header {
    text-align: left;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.movie-header h2 { 
    font-weight: 800; 
    text-transform: uppercase; 
    font-size: 24px; 
    margin: 0; 
    color: #fff;
}
.session-info {
    display: flex;
    gap: 15px;
    margin-top: 8px;
}
.info-tag {
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
}

.tag-sala { 
    color: #fff; 
    background: #e50914; 
    padding: 2px 8px; 
    border-radius: 4px; 
}
.tag-hora { 
    color: #e50914; 
    border: 1px solid #e50914; 
    padding: 1px 8px; 
    border-radius: 4px; 
}

.screen-container { 
    perspective: 400px; 
    margin-bottom: 50px; 
}
.screen {
    height: 10px; 
    width: 80%; 
    background: #e50914; 
    margin: 0 auto;
    transform: rotateX(-45deg);
    box-shadow: 0 15px 50px rgba(229, 9, 20, 0.7);
    border-radius: 5px;
}
.screen-text { 
    font-size: 10px; 
    color: rgba(255,255,255,0.3); 
    text-transform: uppercase; 
    letter-spacing: 5px; 
    margin-top: 15px; 
    text-align: center;
}

.seats-grid { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 40px; 
}
.row { 
    display: flex; 
    gap: 12px; 
    justify-content: center; 
}
.seat {
    width: 40px; 
    height: 40px; 
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px; 
    cursor: pointer; 
    transition: 0.2s;
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-size: 10px; 
    font-weight: 700; 
    color: transparent;
}
.seat:hover:not(.occupied) { 
    background: rgba(255, 255, 255, 0.3); 
    color: #fff; 
    transform: scale(1.1); 
}
.seat.selected { 
    background: #e50914; 
    color: #fff; 
    box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); 
}
.seat.occupied { 
    background: rgba(255, 255, 255, 0.03); 
    cursor: not-allowed; 
    position: relative; 
}
.seat.occupied::after { 
    content: "X"; 
    color: rgba(255,255,255,0.1); 
    font-size: 12px; 
}

.legend { 
    display: flex; 
    justify-content: center; 
    gap: 25px; 
    margin-bottom: 40px; 
    padding: 15px; 
    background: rgba(255,255,255,0.02); 
    border-radius: 12px; 
}
.legend-item { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 12px; 
    color: rgba(255,255,255,0.6); 
}
.legend-item .seat { 
    width: 18px; 
    height: 18px; 
    cursor: default; 
}

.booking-summary { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-top: 1px solid rgba(255,255,255,0.1); 
    padding-top: 30px; 
}
.info h4 { 
    font-weight: 800; 
    margin: 0; 
}
.info p { 
    color: #e50914; 
    margin: 0; 
    font-weight: 700; 
    font-size: 14px; 
}

.btn-confirm { 
    background: #fff; 
    color: #000; 
    border: none; 
    padding: 12px 35px; 
    border-radius: 12px; 
    font-weight: 800; 
    text-transform: uppercase; 
    font-size: 12px; 
    transition: 0.3s; 
}
.btn-confirm:hover { 
    transform: scale(1.05); 
    background: #e50914; 
    color: #fff; 
}

.btn-back { 
    position: absolute; 
    top: 40px; 
    right: 40px; 
    color: rgba(255,255,255,0.4); 
    text-decoration: none; 
    font-size: 12px; 
    font-weight: 600; 
}
.btn-back:hover { 
    color: #fff; 
}
    </style>
</head>
<body>

    <div class="cinema-container">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-times me-1"></i> CANCELAR</a>

        <div class="movie-header">
            <h2 id="displayFilme">FILME</h2>
            <div class="session-info">
                <span class="info-tag tag-sala" id="displaySala">SALA --</span>
                <span class="info-tag tag-hora"><i class="far fa-clock me-1"></i> <span id="displayHora">--:--</span></span>
            </div>
        </div>

        <div class="screen-container">
            <div class="screen"></div>
            <div class="screen-text">TELA</div>
        </div>

        <div class="seats-grid" id="seatsGrid"></div>

        <div class="legend">
            <div class="legend-item"><div class="legend-seat"></div> Disponível</div>
            <div class="legend-item"><div class="legend-seat selected"></div> Selecionado</div>
            <div class="legend-item"><div class="legend-seat occupied"></div> Ocupado</div>
        </div>

        <div class="booking-summary">
            <div class="info">
                <p id="seatCount">0 Assentos selecionados</p>
                <h4 id="totalPrice">R$ 0,00</h4>
            </div>
            <button class="btn-confirm" onclick="finalizarReserva()">Confirmar Reserva</button>
        </div>
    </div>

<script>
    var precoPorAssento = 42.00
    window.onload = function() {
        var parametros = new URLSearchParams(window.location.search)
        document.getElementById('displayFilme').innerText = parametros.get('filme')
        document.getElementById('displayHora').innerText = parametros.get('hora')
        document.getElementById('displaySala').innerText = parametros.get('sala')
        gerarMapa()
    }

    function gerarMapa() {
        var grid = document.getElementById('seatsGrid')
        grid.innerHTML = "";
        var letras = ['A', 'B', 'C', 'D', 'E', 'F',]
        for (var i = 0; i < letras.length; i++) {
            var linhaDiv = document.createElement('div')
            linhaDiv.className = 'row'
            for (var j = 1; j <= 8; j++) {
                var assento = document.createElement('div')
                assento.className = 'seat'
                assento.innerText = letras[i] + j
                if (Math.random() < 0.2) {
                    assento.className = 'seat occupied'
                } else { 
                    assento.onclick = function() {
                        clicarNoAssento(this)
                    }
                }
                linhaDiv.appendChild(assento)
            }
            grid.appendChild(linhaDiv)
        }
    }

function clicarNoAssento(elemento) {
    if (elemento.classList.contains('selected')) {
        elemento.classList.remove('selected')
    } else {
        elemento.classList.add('selected')
    }
    var listaDeSelecionados = document.querySelectorAll('.seat.selected')
    var quantidade = listaDeSelecionados.length
    var conta = quantidade * precoPorAssento
    var totalFormatado = conta.toFixed(2)
    document.getElementById('seatCount').innerText = quantidade + " Assento(s) selecionado(s)"
    document.getElementById('totalPrice').innerText = "R$ " + totalFormatado.replace('.', ',')
}

function finalizarReserva() {
    var selecionados = document.querySelectorAll('.seat.selected')
    if (selecionados.length === 0) {
        alert("Selecione pelo menos um assento!")
        return
    }
    var listaNomes = ""
    for (var i = 0; i < selecionados.length; i++) {
        var nomeDoAssento = selecionados[i].innerText
        listaNomes = listaNomes + nomeDoAssento
        if (i < selecionados.length - 1) {
            listaNomes = listaNomes + ", "
        }
    }
    var filme = document.getElementById('displayFilme').innerText
    var hora = document.getElementById('displayHora').innerText
    var sala = document.getElementById('displaySala').innerText
    var destino = "ingressos.html?filme=" + filme + "&hora=" + hora + "&sala=" + sala + "&assentos=" + listaNomes
    window.location.href = destino
}
</script>
</body>
</html>
